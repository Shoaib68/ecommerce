version: '3.8'

services:
  # MongoDB service
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - emarket-network
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123

  # Backend service
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: emarket-server
    restart: always
    ports:
      - "5001:5001"
    depends_on:
      - mongodb
    networks:
      - emarket-network
    environment:
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/emarket?authSource=admin
      - NODE_ENV=production
      - PORT=5001
      - CLIENT_URL=http://localhost

  # Frontend service
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: emarket-client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - emarket-network
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf

networks:
  emarket-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local 